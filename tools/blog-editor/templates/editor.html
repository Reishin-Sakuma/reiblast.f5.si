<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>r&gt;_ Blog Editor</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2d2d2d;
      --yellow: #ffd700;
      --yellow-dim: #cca800;
      --text: #e0e0e0;
      --muted: #666;
      --green: #7cd300;
      --red: #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--yellow);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; color: var(--yellow); font-family: 'Courier New', monospace; }
    .header-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      transition: all 0.15s;
    }
    .header-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .ext-toggle { display: flex; gap: 3px; margin-left: auto; }
    .ext-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    .ext-btn.active { background: var(--yellow); color: #000; border-color: var(--yellow); font-weight: bold; }

    /* ── Main ── */
    .main { display: flex; flex: 1; overflow: hidden; }
    .left-pane { width: 55%; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
    .right-pane { width: 45%; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Frontmatter ── */
    .fm-section { background: var(--surface); border-bottom: 1px solid var(--border); padding: 9px 13px; flex-shrink: 0; }
    .fm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .fm-grid .span2 { grid-column: 1 / -1; }
    .fm-field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .fm-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 7px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    .fm-field input:focus { outline: none; border-color: var(--yellow); }
    .fm-bottom-row { display: flex; gap: 8px; margin-top: 5px; align-items: center; }
    .fm-draft { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .fm-draft input[type="checkbox"] { accent-color: var(--yellow); }

    /* ── MDX Imports ── */
    #imports-section { display: none; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    #imports-section.visible { display: block; }
    .imports-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 13px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .imports-header label { font-size: 10px; color: var(--muted); text-transform: uppercase; flex-shrink: 0; }
    .import-preset-btn {
      padding: 2px 9px;
      border: 1px solid #3a3a00;
      background: #1a1a00;
      color: var(--yellow);
      cursor: pointer;
      border-radius: 3px;
      font-size: 11px;
      transition: all 0.1s;
    }
    .import-preset-btn:hover { background: #2a2a00; border-color: var(--yellow); }
    .insert-preset-btn {
      padding: 2px 9px;
      border: 1px solid #003a00;
      background: #001a00;
      color: var(--green);
      cursor: pointer;
      border-radius: 3px;
      font-size: 11px;
      transition: all 0.1s;
    }
    .insert-preset-btn:hover { background: #002a00; border-color: var(--green); }
    .imports-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
    #fm-imports {
      display: block;
      width: 100%;
      background: var(--bg);
      border: none;
      color: var(--green);
      padding: 5px 13px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      resize: vertical;
      min-height: 48px;
    }
    #fm-imports:focus { outline: none; }

    /* ── Color presets ── */
    .color-presets {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 13px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .color-presets .pl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-right: 2px; }
    .color-dot {
      width: 16px; height: 16px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.1s;
    }
    .color-dot:hover { transform: scale(1.3); border-color: #fff; }
    .color-dot.clear {
      background: none; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--muted); width: auto; padding: 0 4px;
    }
    .psep { width: 1px; height: 13px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

    /* ── Editor ── */
    .editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .ql-toolbar.ql-snow { background: var(--surface); border: none; border-bottom: 1px solid var(--border); padding: 4px 8px; flex-shrink: 0; }
    .ql-container.ql-snow { flex: 1; border: none; background: var(--bg); overflow: auto; }
    .ql-editor { color: var(--text); font-size: 15px; line-height: 1.85; min-height: 100%; padding: 18px 22px; }
    .ql-editor.ql-blank::before { color: var(--muted); font-style: normal; font-size: 14px; }
    .ql-snow .ql-stroke { stroke: #888; }
    .ql-snow .ql-fill { fill: #888; }
    .ql-snow .ql-picker { color: #888; }
    .ql-snow .ql-picker-options { background: var(--surface); border-color: var(--border); }
    .ql-snow .ql-picker-item { color: var(--text); }
    .ql-snow .ql-picker-item:hover, .ql-snow .ql-picker-item.ql-selected { color: var(--yellow); }
    .ql-snow .ql-picker-label:hover, .ql-snow .ql-picker-label.ql-active { color: var(--yellow); }
    .ql-toolbar.ql-snow button:hover .ql-stroke, .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: var(--yellow); }
    .ql-toolbar.ql-snow button:hover .ql-fill, .ql-toolbar.ql-snow button.ql-active .ql-fill { fill: var(--yellow); }
    .ql-editor u { text-decoration: underline; }
    .ql-editor s { text-decoration: line-through; }
    .ql-editor blockquote { border-left: 3px solid var(--yellow); padding-left: 12px; color: var(--muted); }
    .ql-editor pre.ql-syntax { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--green); font-size: 13px; }
    .ql-editor a { color: var(--yellow); }

    /* ── Preview ── */
    .preview-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 7px 13px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .preview-header h2 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .refresh-btn { padding: 3px 9px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; cursor: pointer; font-size: 12px; }
    .refresh-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    #preview { flex: 1; overflow: auto; padding: 14px 16px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: #7aad88; }

    /* ── Bottom bar ── */
    .bottom-bar {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .save-btn { padding: 6px 22px; background: var(--yellow); color: #000; border: none; border-radius: 4px; font-weight: bold; font-size: 13px; cursor: pointer; }
    .save-btn:hover { background: var(--yellow-dim); }
    .new-btn { padding: 6px 14px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; font-size: 13px; cursor: pointer; }
    .new-btn:hover { border-color: var(--green); color: var(--green); }
    #save-path { font-size: 11px; font-family: 'Courier New', monospace; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #status { font-size: 12px; flex-shrink: 0; }
    #status.success { color: var(--green); }
    #status.error { color: var(--red); }

    /* ── Article List Drawer ── */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed;
      top: 0; left: -420px;
      width: 400px; height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 101;
      display: flex; flex-direction: column;
      transition: left 0.25s ease;
    }
    .drawer.open { left: 0; }
    .drawer-header {
      background: #111;
      border-bottom: 2px solid var(--yellow);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .drawer-header h2 { font-size: 14px; color: var(--yellow); font-family: 'Courier New', monospace; }
    .drawer-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
    .drawer-close:hover { color: var(--text); }
    .drawer-search { padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .drawer-search input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 4px;
      font-size: 13px; font-family: 'Courier New', monospace;
    }
    .drawer-search input:focus { outline: none; border-color: var(--yellow); }
    #post-list { flex: 1; overflow-y: auto; }
    .year-group { padding: 6px 14px 2px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid var(--border); margin-top: 4px; }
    .post-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid #1f1f1f;
      transition: background 0.1s;
    }
    .post-item:hover { background: #1f1f1f; }
    .post-info { flex: 1; min-width: 0; }
    .post-title { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .post-path { font-size: 10px; color: var(--muted); font-family: 'Courier New', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .post-ext { font-size: 10px; color: var(--yellow); font-family: 'Courier New', monospace; flex-shrink: 0; }
    .edit-btn {
      padding: 3px 8px; border: 1px solid var(--border); background: none;
      color: var(--muted); border-radius: 3px; cursor: pointer; font-size: 11px; flex-shrink: 0;
    }
    .edit-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .del-btn {
      padding: 3px 8px; border: 1px solid var(--border); background: none;
      color: var(--muted); border-radius: 3px; cursor: pointer; font-size: 11px; flex-shrink: 0;
    }
    .del-btn:hover { border-color: var(--red); color: var(--red); }
    .no-posts { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── Tweet Drawer ── */
    .tweet-drawer {
      position: fixed;
      top: 0; right: -480px;
      width: 460px; height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 101;
      display: flex; flex-direction: column;
      transition: right 0.25s ease;
    }
    .tweet-drawer.open { right: 0; }
    .tweet-drawer-body {
      flex: 1; overflow-y: auto;
      padding: 12px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .tweet-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .tweet-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .tweet-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--yellow); font-family: 'Courier New', monospace;
    }
    .tweet-chars { font-size: 11px; font-family: 'Courier New', monospace; color: var(--muted); }
    .tweet-chars.over { color: var(--red); }
    .tweet-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.7;
      resize: vertical;
      min-height: 120px;
    }
    .tweet-textarea:focus { outline: none; border-color: var(--yellow); }
    .tweet-copy-btn {
      margin-top: 7px;
      width: 100%;
      padding: 7px;
      background: var(--yellow);
      color: #000;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .tweet-copy-btn:hover { background: var(--yellow-dim); }
    .tweet-copy-btn.copied { background: var(--green); }
    .tweet-info-bar {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }
    .tweet-info-bar p { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .tweet-url-preview {
      font-size: 11px; font-family: 'Courier New', monospace;
      color: var(--yellow); word-break: break-all; margin-bottom: 6px;
    }
    .tweet-regen-btn {
      padding: 4px 12px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    .tweet-regen-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>r&gt;_ Blog Editor</h1>
  <button class="header-btn" onclick="openDrawer()">📂 記事一覧</button>
  <button class="header-btn" onclick="openTweetDrawer()">🐦 ポスト</button>
  <div class="ext-toggle">
    <button class="ext-btn active" data-ext="md"  onclick="setExt('md')">index.md</button>
    <button class="ext-btn"        data-ext="mdx" onclick="setExt('mdx')">index.mdx</button>
  </div>
</header>

<div class="main">

  <!-- ── Left: Editor ── -->
  <div class="left-pane">

    <!-- Frontmatter -->
    <div class="fm-section">
      <div class="fm-grid">
        <div class="fm-field span2">
          <label>タイトル</label>
          <input type="text" id="fm-title" placeholder='24歳から見た「○○の世界」とは'>
        </div>
        <div class="fm-field span2">
          <label>説明文 (description)</label>
          <input type="text" id="fm-desc" placeholder="記事の説明文">
        </div>
        <div class="fm-field">
          <label>slug</label>
          <input type="text" id="fm-slug" placeholder="24sai-kara-mita-xxx">
        </div>
        <div class="fm-field">
          <label>pubDate</label>
          <input type="datetime-local" id="fm-date">
        </div>
        <div class="fm-field span2">
          <label>タグ（カンマ区切り）</label>
          <input type="text" id="fm-tags" placeholder="技術, 日記, インフラ">
        </div>
      </div>
      <div class="fm-bottom-row">
        <div class="fm-draft">
          <input type="checkbox" id="fm-draft">
          <label for="fm-draft">下書き (draft)</label>
        </div>
        <div class="fm-field" style="flex:0 0 195px; margin-left:auto;">
          <label>updatedDate（任意）</label>
          <input type="datetime-local" id="fm-updated">
        </div>
      </div>
    </div>

    <!-- MDX Imports -->
    <div id="imports-section">
      <div class="imports-header">
        <label>imports</label>
        <button class="import-preset-btn" onclick="addImport('Note')">+ Note</button>
        <button class="import-preset-btn" onclick="addImport('LinkCard')">+ LinkCard</button>
        <button class="import-preset-btn" onclick="addImport('Details')">+ Details</button>
        <div class="imports-sep"></div>
        <label>挿入:</label>
        <button class="insert-preset-btn" onclick="insertComponent('Note','info')">Note(info)</button>
        <button class="insert-preset-btn" onclick="insertComponent('Note','warning')">Note(warn)</button>
        <button class="insert-preset-btn" onclick="insertComponent('Note','tip')">Note(tip)</button>
        <button class="insert-preset-btn" onclick="insertComponent('Note','danger')">Note(!)</button>
        <button class="insert-preset-btn" onclick="insertComponent('LinkCard')">LinkCard</button>
        <button class="insert-preset-btn" onclick="insertComponent('Details')">Details</button>
      </div>
      <textarea id="fm-imports" rows="2"
        placeholder="import Note from '@/components/blog/Note.astro';&#10;import LinkCard from '@/components/blog/LinkCard.astro';"></textarea>
    </div>

    <!-- Quick color presets -->
    <div class="color-presets">
      <span class="pl">文字色</span>
      <div class="color-dot" style="background:#ff0000" title="赤 #ff0000"    onclick="applyColor('#ff0000')"></div>
      <div class="color-dot" style="background:#0000ff" title="青 #0000ff"    onclick="applyColor('#0000ff')"></div>
      <div class="color-dot" style="background:#8f20ff" title="紫 #8f20ff"    onclick="applyColor('#8f20ff')"></div>
      <div class="color-dot" style="background:#ff7f00" title="オレンジ #ff7f00" onclick="applyColor('#ff7f00')"></div>
      <div class="color-dot" style="background:#ffd700" title="黄 #ffd700"    onclick="applyColor('#ffd700')"></div>
      <div class="color-dot" style="background:#ff007d" title="ピンク #ff007d" onclick="applyColor('#ff007d')"></div>
      <div class="color-dot" style="background:#7cd300" title="黄緑 #7cd300"  onclick="applyColor('#7cd300')"></div>
      <div class="color-dot" style="background:#fff"    title="白 #ffffff"    onclick="applyColor('#ffffff')"></div>
      <div class="color-dot clear" title="色なし" onclick="applyColor(false)">✕</div>
      <div class="psep"></div>
      <span class="pl">背景</span>
      <div class="color-dot" style="background:#ffcc00"           title="黄ハイライト" onclick="applyBg('#ffcc00')"></div>
      <div class="color-dot" style="background:#7cd300;opacity:.6" title="緑ハイライト" onclick="applyBg('#7cd300')"></div>
      <div class="color-dot clear" title="背景なし" onclick="applyBg(false)">✕</div>
    </div>

    <!-- Quill -->
    <div class="editor-wrap">
      <div id="editor"></div>
    </div>

  </div>

  <!-- ── Right: Preview ── -->
  <div class="right-pane">
    <div class="preview-header">
      <h2>Markdown プレビュー</h2>
      <button class="refresh-btn" onclick="refreshPreview()">更新 ↻</button>
    </div>
    <pre id="preview">← 「更新 ↻」で Markdown を確認</pre>
  </div>

</div>

<!-- ── Bottom bar ── -->
<div class="bottom-bar">
  <button class="save-btn" onclick="savePost()">保存</button>
  <button class="new-btn" onclick="newPost()">＋ 新規</button>
  <span id="save-path"></span>
  <span id="status"></span>
</div>

<!-- ── Article List Drawer ── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>📂 記事一覧</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-search">
    <input type="text" id="drawer-search" placeholder="タイトル検索..." oninput="filterPosts(this.value)">
  </div>
  <div id="post-list"><div class="no-posts">読み込み中...</div></div>
</div>

<!-- ── Tweet Template Drawer ── -->
<div class="drawer-overlay" id="tweet-overlay" onclick="closeTweetDrawer()"></div>
<div class="tweet-drawer" id="tweet-drawer">
  <div class="drawer-header">
    <h2>🐦 ポスト用テンプレート</h2>
    <button class="drawer-close" onclick="closeTweetDrawer()">✕</button>
  </div>
  <div class="tweet-info-bar">
    <p>記事タイトル・日付・slugを入力してから開くと自動入力されます。</p>
    <div class="tweet-url-preview" id="tweet-url-preview">🔗 -</div>
    <button class="tweet-regen-btn" onclick="buildTweetTemplates()">↻ 再生成</button>
  </div>
  <div class="tweet-drawer-body" id="tweet-drawer-body"></div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>

// ── Quill ──────────────────────────────────────────────────────────────────
const PRESET_COLORS = [
  '#ff0000','#ff007d','#ff7f00','#ffd700','#7cd300',
  '#0000ff','#8f20ff','#00ccff','#ffffff','#e0e0e0','#888','#000','#ffcc00',
];
const quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: 'どうも、レイと申します。\n\n本文を書いてください...',
  modules: {
    toolbar: [
      [{ header: [1, 2, 3, false] }],
      ['bold', 'italic', 'underline', 'strike'],
      [{ color: PRESET_COLORS }, { background: PRESET_COLORS }],
      ['link', 'blockquote', 'code-block'],
      [{ list: 'ordered' }, { list: 'bullet' }],
      ['clean'],
    ]
  }
});

// ── 状態 ──────────────────────────────────────────────────────────────────
let currentExt = 'md';
let originalPath = '';   // 編集中の既存記事パス（新規なら空）
let allPosts = [];       // 記事一覧キャッシュ

// ── 拡張子切り替え ─────────────────────────────────────────────────────────
function setExt(ext) {
  currentExt = ext;
  document.querySelectorAll('.ext-btn').forEach(b => b.classList.toggle('active', b.dataset.ext === ext));
  document.getElementById('imports-section').classList.toggle('visible', ext === 'mdx');
}

// ── カラー適用 ─────────────────────────────────────────────────────────────
function applyColor(c) { quill.format('color', c || false); }
function applyBg(c)    { quill.format('background', c || false); }

// ── MDX コンポーネントプリセット ───────────────────────────────────────────
const IMPORT_MAP = {
  Note:     "import Note from '@/components/blog/Note.astro';",
  LinkCard: "import LinkCard from '@/components/blog/LinkCard.astro';",
  Details:  "import Details from '@/components/blog/Details.astro';",
};

const COMPONENT_TEMPLATES = {
  'Note-info':    '<Note type="info" title="情報">ここに内容を書く</Note>',
  'Note-warning': '<Note type="warning" title="注意">ここに内容を書く</Note>',
  'Note-tip':     '<Note type="tip" title="ヒント">ここに内容を書く</Note>',
  'Note-danger':  '<Note type="danger" title="警告">ここに内容を書く</Note>',
  'LinkCard':     '<LinkCard url="https://example.com" />',
  'Details':      '<Details summary="詳細を見る">ここに内容を書く</Details>',
};

function addImport(component) {
  const ta = document.getElementById('fm-imports');
  const line = IMPORT_MAP[component];
  if (!ta.value.includes(line)) {
    ta.value = ta.value.trim() ? ta.value.trim() + '\n' + line : line;
  }
}

function insertComponent(type, variant) {
  const key = variant ? `${type}-${variant}` : type;
  const tpl = COMPONENT_TEMPLATES[key];
  if (!tpl) return;
  const range = quill.getSelection(true);
  quill.clipboard.dangerouslyPasteHTML(range ? range.index : quill.getLength(), `<p>${tpl}</p>`);
  addImport(type);  // import も自動追加
}

// ── 初期日時 ───────────────────────────────────────────────────────────────
(function setDefaultDate() {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
  document.getElementById('fm-date').value = local.toISOString().slice(0, 16);
})();

// ── フロントマタープレビュー文字列 ────────────────────────────────────────
function buildFrontmatterText() {
  const title   = document.getElementById('fm-title').value;
  const desc    = document.getElementById('fm-desc').value;
  const slug    = document.getElementById('fm-slug').value;
  const dateVal = document.getElementById('fm-date').value;
  const tagsRaw = document.getElementById('fm-tags').value;
  const draft   = document.getElementById('fm-draft').checked;
  const updated = document.getElementById('fm-updated').value;
  const tags    = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
  const tagsStr = '[' + tags.map(t => `"${t}"`).join(', ') + ']';
  const pubDate = dateVal ? dateVal + ':00' : '';
  let fm = `---\ntitle: "${title}"\ndescription: "${desc}"\npubDate: ${pubDate}\nslug: ${slug}\nauthor: reiblast1123\ntags: ${tagsStr}\ndraft: ${draft}`;
  if (updated) fm += `\nupdatedDate: ${updated}:00`;
  fm += '\n---';
  if (currentExt === 'mdx') {
    const imports = document.getElementById('fm-imports').value.trim();
    if (imports) fm += '\n\n' + imports;
  }
  return fm;
}

// ── プレビュー ─────────────────────────────────────────────────────────────
async function refreshPreview() {
  try {
    const res = await fetch('/api/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html: quill.root.innerHTML }),
    });
    const data = await res.json();
    document.getElementById('preview').textContent = buildFrontmatterText() + '\n\n' + data.markdown;
  } catch (e) {
    document.getElementById('preview').textContent = 'エラー: ' + e.message;
  }
}

// ── 保存 ───────────────────────────────────────────────────────────────────
async function savePost() {
  const title   = document.getElementById('fm-title').value.trim();
  const slug    = document.getElementById('fm-slug').value.trim();
  if (!title) { setStatus('タイトルを入力してください', true); return; }
  if (!slug)  { setStatus('slug を入力してください', true);   return; }

  const dateVal = document.getElementById('fm-date').value;
  const tagsRaw = document.getElementById('fm-tags').value;
  const pubDate = dateVal ? dateVal + ':00' : new Date().toISOString().slice(0, 19);
  const updated = document.getElementById('fm-updated').value;

  setStatus('保存中...', false);
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title,
        description: document.getElementById('fm-desc').value.trim(),
        slug,
        pubDate,
        tags: tagsRaw.split(',').map(t => t.trim()).filter(Boolean),
        draft: document.getElementById('fm-draft').checked,
        updatedDate: updated ? updated + ':00' : '',
        imports: document.getElementById('fm-imports').value,
        ext: currentExt,
        body: quill.root.innerHTML,
        author: 'reiblast1123',
        originalPath,
      }),
    });
    const data = await res.json();
    if (data.success) {
      // 保存後は元ファイルが消えているので追跡パスを更新
      const relFromBlog = data.path.replace(/^src\/content\/blog\//, '');
      originalPath = relFromBlog;
      document.getElementById('save-path').textContent = '→ ' + data.path;
      setStatus('保存しました ✓', false);
      await refreshPreview();
    } else {
      setStatus('エラー: ' + (data.error || JSON.stringify(data)), true);
    }
  } catch (e) {
    setStatus('エラー: ' + e.message, true);
  }
}

// ── 新規 ───────────────────────────────────────────────────────────────────
async function newPost() {
  if (quill.getText().trim() && !confirm('現在の内容を破棄して新規作成しますか？')) return;
  document.getElementById('fm-title').value   = '';
  document.getElementById('fm-desc').value    = '';
  document.getElementById('fm-slug').value    = '';
  document.getElementById('fm-tags').value    = '';
  document.getElementById('fm-draft').checked = false;
  document.getElementById('fm-updated').value = '';
  document.getElementById('fm-imports').value = '';
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
  document.getElementById('fm-date').value = local.toISOString().slice(0, 16);
  originalPath = '';
  document.getElementById('save-path').textContent = '';
  document.getElementById('preview').textContent   = '← 「更新 ↻」で Markdown を確認';
  setStatus('', false);
  setExt('md');
  await loadTemplate();
}

async function loadTemplate() {
  try {
    const res  = await fetch('/api/template');
    const data = await res.json();
    quill.root.innerHTML = data.bodyHtml || '';
  } catch (_) {
    quill.root.innerHTML = '';
  }
}

// ── ステータス表示 ─────────────────────────────────────────────────────────
function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className   = isError ? 'error' : 'success';
}

// ── 記事一覧ドロワー ───────────────────────────────────────────────────────
async function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer-search').value = '';
  await loadPostList();
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

async function loadPostList() {
  try {
    const res = await fetch('/api/posts');
    allPosts = await res.json();
    renderPostList(allPosts);
  } catch (e) {
    document.getElementById('post-list').innerHTML = `<div class="no-posts">エラー: ${e.message}</div>`;
  }
}

function renderPostList(posts) {
  const container = document.getElementById('post-list');
  if (posts.length === 0) {
    container.innerHTML = '<div class="no-posts">記事が見つかりません</div>';
    return;
  }

  // 年ごとにグループ化
  const groups = {};
  for (const post of posts) {
    const year = post.path.slice(0, 4);
    if (!groups[year]) groups[year] = [];
    groups[year].push(post);
  }

  let html = '';
  for (const year of Object.keys(groups).sort().reverse()) {
    html += `<div class="year-group">${year}</div>`;
    for (const post of groups[year]) {
      const pathEsc  = escapeAttr(post.path);
      const titleEsc = escapeAttr(post.title);
      const extLabel = post.ext || '.md';
      html += `
        <div class="post-item" id="item-${CSS.escape(post.path)}">
          <div class="post-info">
            <div class="post-title">${escapeHtml(post.title)}</div>
            <div class="post-path">${escapeHtml(post.path)}</div>
          </div>
          <span class="post-ext">${extLabel}</span>
          <button class="edit-btn" onclick="editPost('${pathEsc}')">編集</button>
          <button class="del-btn"  onclick="deletePost('${pathEsc}', '${titleEsc}')">削除</button>
        </div>`;
    }
  }
  container.innerHTML = html;
}

function filterPosts(query) {
  const q = query.toLowerCase();
  const filtered = q
    ? allPosts.filter(p => p.title.toLowerCase().includes(q) || p.path.toLowerCase().includes(q))
    : allPosts;
  renderPostList(filtered);
}

// ── 記事を読み込んで編集 ───────────────────────────────────────────────────
async function editPost(path) {
  try {
    const res  = await fetch('/api/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path }),
    });
    const data = await res.json();
    if (!data.success) { alert('読み込みエラー: ' + data.error); return; }

    document.getElementById('fm-title').value   = data.title;
    document.getElementById('fm-desc').value    = data.description;
    document.getElementById('fm-slug').value    = data.slug;
    document.getElementById('fm-date').value    = data.pubDate;
    document.getElementById('fm-tags').value    = (data.tags || []).join(', ');
    document.getElementById('fm-draft').checked = data.draft;
    document.getElementById('fm-updated').value = data.updatedDate || '';
    document.getElementById('fm-imports').value = data.imports || '';

    setExt(data.ext || 'md');
    quill.root.innerHTML = data.bodyHtml || '';
    originalPath = path;

    document.getElementById('save-path').textContent = '編集中: ' + path;
    document.getElementById('preview').textContent   = '← 「更新 ↻」で確認';
    setStatus('読み込みました ✓', false);
    closeDrawer();
  } catch (e) {
    alert('エラー: ' + e.message);
  }
}

// ── 記事削除 ───────────────────────────────────────────────────────────────
async function deletePost(path, title) {
  if (!confirm(`「${title}」を削除しますか？\n\n${path}\n\nこの操作は取り消せません。`)) return;
  try {
    const res  = await fetch('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path }),
    });
    const data = await res.json();
    if (data.success) {
      allPosts = allPosts.filter(p => p.path !== path);
      renderPostList(allPosts);
      // 編集中の記事を削除した場合はリセット
      if (originalPath === path) newPost();
    } else {
      alert('削除エラー: ' + (data.error || ''));
    }
  } catch (e) {
    alert('エラー: ' + e.message);
  }
}

// ── ユーティリティ ─────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) {
  return String(s).replace(/'/g, "\\'");
}

function getTweetUrl() {
  const slug    = document.getElementById('fm-slug').value.trim();
  const dateVal = document.getElementById('fm-date').value; // YYYY-MM-DDTHH:MM
  if (!slug || !dateVal) return null;
  const [datePart] = dateVal.split('T');
  const [y, m, d]  = datePart.split('-');
  return `https://reiblast.f5.si/blog/${y}/${m}/${d}/${slug}/`;
}

function buildTweetTemplates() {
  const title    = document.getElementById('fm-title').value.trim() || '（タイトル未入力）';
  const url      = getTweetUrl() || 'https://reiblast.f5.si/blog/...';
  const tagsRaw  = document.getElementById('fm-tags').value;
  const hashTags = tagsRaw
    .split(',')
    .map(t => t.trim())
    .filter(Boolean)
    .map(t => ' #' + t.replace(/\s+/g, ''))
    .join('');

  document.getElementById('tweet-url-preview').textContent = '🔗 ' + url;

  const body = document.getElementById('tweet-drawer-body');
  body.innerHTML = TWEET_DEFS.map((def, i) => `
    <div class="tweet-card">
      <div class="tweet-card-header">
        <span class="tweet-label">${def.label}</span>
        <span class="tweet-chars" id="tweet-chars-${i}">-- 文字</span>
      </div>
      <textarea class="tweet-textarea" id="tweet-text-${i}" rows="9"
        oninput="updateTweetChars(${i})"></textarea>
      <button class="tweet-copy-btn" id="tweet-copy-${i}"
        onclick="copyTweet(${i})">コピー</button>
    </div>`).join('');

  // textarea.value はinnerHTMLではなくJSで設定（エスケープ問題を回避）
  TWEET_DEFS.forEach((def, i) => {
    document.getElementById(`tweet-text-${i}`).value = def.build(title, url, hashTags);
    updateTweetChars(i);
  });
}

/** X の文字数カウント（URL は長さに関わらず23文字固定扱い） */
function tweetLength(text) {
  const noUrl = text.replace(/https?:\/\/[^\s]+/g, '_'.repeat(23));
  return [...noUrl].length;
}

function updateTweetChars(i) {
  const text = document.getElementById(`tweet-text-${i}`).value;
  const len  = tweetLength(text);
  const el   = document.getElementById(`tweet-chars-${i}`);
  el.textContent = len + ' 文字';
  el.classList.toggle('over', len > 260);
}

async function copyTweet(i) {
  const text = document.getElementById(`tweet-text-${i}`).value;
  const btn  = document.getElementById(`tweet-copy-${i}`);
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    // HTTP 環境・旧ブラウザのフォールバック
    const ta = document.getElementById(`tweet-text-${i}`);
    ta.select();
    document.execCommand('copy');
  }
  btn.textContent = 'コピーしました ✓';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'コピー';
    btn.classList.remove('copied');
  }, 2000);
}

function openTweetDrawer() {
  buildTweetTemplates();
  document.getElementById('tweet-drawer').classList.add('open');
  document.getElementById('tweet-overlay').classList.add('open');
}

function closeTweetDrawer() {
  document.getElementById('tweet-drawer').classList.remove('open');
  document.getElementById('tweet-overlay').classList.remove('open');
}

// ── Ctrl+S で保存 ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); savePost(); }
  if (e.key === 'Escape') { closeDrawer(); closeTweetDrawer(); }
});

// ── 初期ロード時にテンプレートを展開 ────────────────────────────────────────
loadTemplate();
